<!DOCTYPE html>
<html>
<head>
    <title>شکار موش</title>
    <style>
        #game-area {
            width: 400px;
            height: 400px;
            position: relative;
            border: 1px solid black;
            perspective: 800px;
        }
        #mouse {
            width: 50px;
            height: 50px;
            background-color: gray;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
        }
        #game-area:hover #mouse {
            background-color: red;
        }
    </style>
</head>
<body>
    <div id="game-area">
        <div id="mouse"></div>
    </div>

    <script>
        const gameArea = document.getElementById('game-area');
        const mouse = document.getElementById('mouse');

        gameArea.addEventListener('mousemove', (event) => {
            const x = event.clientX - gameArea.offsetLeft;
            const y = event.clientY - gameArea.offsetTop;

            mouse.style.left = x + 'px';
            mouse.style.top = y + 'px';
        });
    </script>
</body>
</html>
