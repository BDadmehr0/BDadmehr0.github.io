<!DOCTYPE html>
<html>
<head>
    <title>بازی شوتر ساده</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
        }
        #game-area {
            width: 100%;
            height: 100vh;
            position: relative;
        }
        .object {
            width: 20px;
            height: 20px;
            background-color: #fff;
            position: absolute;
            top: 0;
            left: 0;
            transition: top 1s linear;
        }
        #player {
            width: 50px;
            height: 50px;
            background-color: red;
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
        }
    </style>
</head>
<body>
    <div id="game-area">
        <div id="player"></div>
    </div>

    <script>
        const gameArea = document.getElementById('game-area');
        const player = document.getElementById('player');
        let isShooting = false;

        gameArea.addEventListener('mousemove', (event) => {
            const x = event.clientX - gameArea.offsetLeft;
            player.style.left = x + 'px';
        });

        gameArea.addEventListener('mousedown', () => {
            isShooting = true;
            shoot();
        });

        gameArea.addEventListener('mouseup', () => {
            isShooting = false;
        });

        function shoot() {
            if (isShooting) {
                const bullet = document.createElement('div');
                bullet.className = 'object bullet';
                bullet.style.left = player.style.left;
                gameArea.appendChild(bullet);

                let topPos = 0;
                const bulletInterval = setInterval(() => {
                    topPos -= 10;
                    bullet.style.top = topPos + 'px';

                    if (topPos <= -20) {
                        bullet.remove();
                        clearInterval(bulletInterval);
                    }
                }, 50);

                setTimeout(shoot, 300);
            }
        }
    </script>
</body>
</html>
