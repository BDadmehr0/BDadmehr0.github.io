<!DOCTYPE html>
<html>
<head>
  <style>
    /* استایل‌های صفحه */
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }
    
    /* پس زمینه تم سیاه */
    body {
      background-color: black;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    /* استایل دکمه */
    .button {
      padding: 12px 24px;
      font-size: 18px;
      color: white;
      background-color: #333;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
    }
    
    /* انیمیشن دکمه */
    .button:hover {
      animation: pulse 1s infinite;
    }
    
    @keyframes pulse {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.1);
      }
      100% {
        transform: scale(1);
      }
    }
  </style>
</head>
<body>
  <a href="/assets/Dadmehr%20Emami_1402-3-21.pdf" download class="button">دانلود فایل</a>
</body>
</html>
