<!DOCTYPE html>
<html>
<head>
  <style>
    /* استایل‌های صفحه */
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }
    
    /* پس زمینه تم سیاه */
    body {
      background-color: black;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    /* استایل دکمه */
    .a {
      padding: 12px 24px;
      font-size: 18px;
      color: white;
      background-color: transparent;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
      position: relative;
      overflow: hidden;
    }
    
    /* افکت بلور */
    .a::after {
      content: "";
      position: absolute;
      top: -10px;
      left: -10px;
      right: -10px;
      bottom: -10px;
      z-index: -1;
      pointer-events: none;
      background: linear-gradient(45deg, rgba(255, 0, 0, 0.4), rgba(0, 0, 255, 0.4), rgba(255, 255, 0, 0.4), rgba(0, 255, 0, 0.4), rgba(255, 0, 255, 0.4), rgba(0, 255, 255, 0.4), rgba(255, 0, 0, 0.4));
      background-size: 300% 300%;
      animation: gradientAnimation 5s infinite;
    }
    
    /* انیمیشن تغییر رنگ */
    @keyframes gradientAnimation {
      0% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
      100% {
        background-position: 0% 50%;
      }
    }
  </style>
</head>
<body>
    <a href="/assets/Dadmehr%20Emami_1402-3-21.pdf" download class="button">دانلود فایل</a>

  <script>
    // اضافه کردن کلاس بلور به دکمه برای اعمال افکت بلور
    const button = document.querySelector('.button');
    button.addEventListener('mouseover', function() {
      button.classList.add('blurred');
    });
    button.addEventListener('mouseout', function() {
      button.classList.remove('blurred');
    });
  </script>
</body>
</html>
